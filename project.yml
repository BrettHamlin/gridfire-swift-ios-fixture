name: GridfireSwiftIOSFixture
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
targets:
  GridfireSwiftIOSFixture:
    type: application
    platform: iOS
    sources:
      - path: GridfireSwiftIOSFixture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridfire.fixture.ios
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
  GridfireSwiftIOSFixtureTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GridfireSwiftIOSFixtureTests
    dependencies:
      - target: GridfireSwiftIOSFixture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gridfire.fixture.ios.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  GridfireSwiftIOSFixture:
    shared: true
    build:
      targets:
        GridfireSwiftIOSFixture: all
    test:
      gatherCoverageData: false
      targets:
        - GridfireSwiftIOSFixtureTests

