name: Gridfire Build

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Git ref to build
        required: true
        type: string

jobs:
  build:
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      EXPECTED_XCODE_VERSION: Xcode 26.4.1
      XCODE_PROJECT: GridfireSwiftIOSFixture.xcodeproj
      XCODE_SCHEME: GridfireSwiftIOSFixture
      XCODE_DESTINATION: platform=iOS Simulator,name=iPhone 17,OS=26.4
      DERIVED_DATA_PATH: /tmp/gridfire-swift-ios-fixture-derived-data
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
      - name: Prove pinned Xcode and destination
        run: |
          if [[ ! -d "$DEVELOPER_DIR" ]]; then
            echo "Pinned Xcode not found at $DEVELOPER_DIR" >&2
            ls -1 /Applications | grep -E '^Xcode' >&2 || true
            exit 1
          fi
          echo "$DEVELOPER_DIR/usr/bin" >> "$GITHUB_PATH"
          xcodebuild -version | tee "$RUNNER_TEMP/gridfire-xcode-version.txt"
          grep -q "$EXPECTED_XCODE_VERSION" "$RUNNER_TEMP/gridfire-xcode-version.txt"
          xcrun simctl list devices available | tee "$RUNNER_TEMP/gridfire-simctl-devices.txt"
          xcodebuild -showdestinations \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            | tee "$RUNNER_TEMP/gridfire-xcode-destinations.txt"
          grep -q "platform:iOS Simulator.*OS:26.4.*name:iPhone 17" "$RUNNER_TEMP/gridfire-xcode-destinations.txt"
      - name: Build iOS simulator app
        run: |
          set -o pipefail
          rm -rf "$DERIVED_DATA_PATH"
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "$XCODE_DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            | tee "$RUNNER_TEMP/gridfire-xcodebuild-build.log"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gridfire-xcodebuild-build-log
          path: |
            ${{ runner.temp }}/gridfire-xcode-version.txt
            ${{ runner.temp }}/gridfire-simctl-devices.txt
            ${{ runner.temp }}/gridfire-xcode-destinations.txt
            ${{ runner.temp }}/gridfire-xcodebuild-build.log
          if-no-files-found: ignore
